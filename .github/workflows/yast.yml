name: YaST integration tests
on: [pull_request]

permissions:
  contents: read

jobs:
  yast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Go
        run: go mod vendor

      - name: Run test-yast
        run: make test-yast
